# EVIF Prometheus Scrape Configuration
# Complete Prometheus config for EVIF monitoring
#
# Usage: prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - 'alerting_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'evif-rest'
    static_configs:
      - targets:
          - 'evif-rest:8081'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true
