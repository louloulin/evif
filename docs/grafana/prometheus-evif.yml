# Prometheus scrape configuration for EVIF REST API
# Add to your prometheus.yml under scrape_configs:
#
# scrape_configs:
#   - job_name: 'evif-rest'
#     static_configs:
#       - targets: ['evif-rest:8081']
#     metrics_path: '/api/v1/metrics/prometheus'
#     scrape_interval: 15s

scrape_configs:
  - job_name: 'evif-rest'
    static_configs:
      - targets:
          - 'evif-rest:8081'
    metrics_path: '/api/v1/metrics/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
