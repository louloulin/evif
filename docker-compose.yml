# =============================================================================
# EVIF Docker Compose
# =============================================================================
# Development and production deployment configuration
# Usage:
#   - Development: docker-compose up -d
#   - Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # REST API Server
  evif-rest:
    image: evif/evif-rest:latest
    container_name: evif-rest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      # Server configuration
      - EVIF_REST_BIND_ADDR=0.0.0.0
      - EVIF_REST_PORT=8081

      # Authentication (CHANGE IN PRODUCTION!)
      - EVIF_REST_AUTH_MODE=enabled
      - EVIF_REST_WRITE_API_KEYS=dev-write-key-change-me
      - EVIF_REST_ADMIN_API_KEYS=dev-admin-key-change-me

      # Memory backend (use sqlite for production)
      - EVIF_REST_MEMORY_BACKEND=memory
      # - EVIF_REST_MEMORY_SQLITE_PATH=/data/evif-memory.db
      # - EVIF_REST_PRODUCTION_MODE=true

      # Logging
      - RUST_LOG=info
      - EVIF_REST_AUTH_AUDIT_LOG=/var/log/evif/audit.log
    volumes:
      - evif-data:/data
      - evif-logs:/var/log/evif
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - evif-network

  # Optional: Frontend (for development)
  evif-web:
    image: node:20-alpine
    container_name: evif-web-dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8081
    volumes:
      - ./evif-web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
    networks:
      - evif-network
    depends_on:
      - evif-rest

volumes:
  evif-data:
    driver: local
  evif-logs:
    driver: local

networks:
  evif-network:
    driver: bridge
