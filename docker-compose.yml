# =============================================================================
# EVIF Docker Compose - Base Configuration
# =============================================================================
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  evif-rest:
    image: evif/evif-rest:latest
    container_name: evif-rest
    ports:
      - "8081:8081"
    volumes:
      - evif-data:/data
      - evif-logs:/var/log/evif
    restart: unless-stopped

volumes:
  evif-data:
    driver: local
  evif-logs:
    driver: local
