global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'evif-mem'
    environment: 'development'

scrape_configs:
  - job_name: 'evif-mem'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'evif-mem'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
