syntax = "proto3";

package evif;

// EVIF gRPC 服务定义
service EvifService {
  // 节点操作
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc PutNode(PutNodeRequest) returns (PutNodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);

  // 批量操作
  rpc BatchGetNodes(BatchGetNodesRequest) returns (stream NodeResponse);
  rpc BatchPutNodes(stream PutNodeRequest) returns (BatchPutNodesResponse);

  // 查询操作
  rpc Query(QueryRequest) returns (stream NodeResponse);

  // 文件操作
  rpc ReadFile(ReadFileRequest) returns (stream DataChunk);
  rpc WriteFile(stream DataChunk) returns (WriteFileResponse);

  // 统计和管理
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

// 节点相关消息
message GetNodeRequest {
  string id = 1;
}

message GetNodeResponse {
  Node node = 1;
}

message PutNodeRequest {
  Node node = 1;
}

message PutNodeResponse {
  string id = 1;
}

message DeleteNodeRequest {
  string id = 1;
}

message DeleteNodeResponse {
  bool success = 1;
}

message BatchGetNodesRequest {
  repeated string ids = 1;
}

message BatchPutNodesResponse {
  repeated string ids = 1;
  int32 count = 2;
}

// 查询消息
message QueryRequest {
  string query = 1;
  uint32 limit = 2;
}

message NodeResponse {
  Node node = 1;
}

// 文件操作消息
message ReadFileRequest {
  string path = 1;
  uint64 offset = 2;
  uint64 size = 3;
}

message DataChunk {
  bytes data = 1;
  uint64 offset = 2;
  bool eof = 3;
}

message WriteFileResponse {
  uint64 bytes_written = 1;
  string path = 2;
}

// 统计消息
message StatsRequest {
  bool detailed = 1;
}

message StatsResponse {
  uint64 total_nodes = 1;
  uint64 total_edges = 2;
  uint64 uptime_secs = 3;
  string status = 4;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
}

// 节点定义
message Node {
  string id = 1;
  string node_type = 2;
  map<string, string> metadata = 3;
  map<string, Value> attributes = 4;
  bytes content = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

// 值类型（支持多种类型）
message Value {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes bytes_value = 5;
    string string_array = 6;
  }
}
